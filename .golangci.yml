run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - gofmt
    - goimports
    - revive
    - gosec
    - gocritic
    - prealloc

  disable:
    - wsl
    - wrapcheck
    - exhaustruct
    - varnamelen
    - ireturn

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
